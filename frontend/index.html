<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TTB Label Review</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>TTB COLA Label Review</h1>
  </header>

  <main>
    <section id="submissions-panel">
      <h2>Pending Submissions</h2>
      <div id="submissions-list">Loading...</div>
    </section>

    <section id="review-panel" class="hidden">
      <h2>Label Review</h2>
      <div id="label-images"></div>
      <div id="application-meta"></div>
      <button id="run-review-btn">Run AI Review</button>
      <div id="review-result" class="hidden"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
